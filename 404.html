<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없어요 — 경알못</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", -apple-system, sans-serif;
    background: linear-gradient(135deg, #1b2f63, #0e1a3a); color: #fff; text-align: center; padding: 24px;
  }
  .box { max-width: 420px; }
  .mark {
    width: 76px; height: 76px; border-radius: 20px; background: #0e1a3a; border: 2px solid #d9a441;
    color: #d9a441; font-size: 40px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  h1 { font-size: 72px; margin: 0; color: #d9a441; }
  h2 { font-size: 22px; margin: 8px 0 12px; }
  p { color: #c7cee0; line-height: 1.6; }
  a {
    display: inline-block; margin-top: 20px; padding: 12px 22px; border-radius: 10px;
    background: #d9a441; color: #0e1a3a; font-weight: 700; text-decoration: none;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="mark">경</div>
    <h1>404</h1>
    <h2>페이지를 찾을 수 없어요</h2>
    <p>주소가 바뀌었거나 삭제된 페이지일 수 있어요.<br>홈으로 돌아가 최신 경제 브리핑을 확인해보세요.</p>
    <a href="/AI-Chatbot/">홈으로 가기</a>
  </div>
</body>
</html>
