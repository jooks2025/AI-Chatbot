name: Market update (near real-time)

on:
  schedule:
    # 15분마다(UTC). 무료 데이터(Stooq)가 약 15분 지연이라 이보다 짧게 해도 같은 값이 옴.
    # 데이터가 바뀔 때만 커밋하므로 장 마감·주말엔 커밋이 쌓이지 않음.
    # 예약 실행은 저장소 기본 브랜치에서만 동작함.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-market
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update market snapshot
        run: python scripts/update_market.py

      - name: Update sector news (Korean)
        run: python scripts/update_sector_news.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json data/sector_news.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "Auto-update market snapshot and sector news"
            git push
          fi
