<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 경제 브리핑</title>
<meta name="description" content="경제 기사 요약과 거시·기업 펀더멘탈 지표를 정리하는 개인 블로그">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>📊 나의 경제 브리핑</h1>
      <p class="tagline">경제 기사와 펀더멘탈 수치를 한눈에 정리하는 블로그</p>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="news" role="tab" aria-selected="true">📰 뉴스 피드</button>
    <button class="tab-btn" data-tab="fundamentals" role="tab" aria-selected="false">📈 펀더멘탈 대시보드</button>
  </nav>

  <main class="container">
    <!-- 뉴스 피드 -->
    <section id="news" class="tab-panel active">
      <div class="toolbar">
        <input type="search" id="newsSearch" placeholder="제목·요약 검색...">
        <select id="newsFilter">
          <option value="all">전체 카테고리</option>
          <option value="거시경제">거시경제</option>
          <option value="금리·통화정책">금리·통화정책</option>
          <option value="주식·증시">주식·증시</option>
          <option value="환율">환율</option>
          <option value="산업·기업">산업·기업</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div id="newsList" class="card-list"></div>
      <p id="newsEmpty" class="empty-msg" hidden>아직 등록된 기사가 없어요. 곧 첫 글이 올라올 예정이에요.</p>
    </section>

    <!-- 펀더멘탈 대시보드 -->
    <section id="fundamentals" class="tab-panel">
      <nav class="subtabs">
        <button class="subtab-btn active" data-subtab="macro">🌍 거시 지표</button>
        <button class="subtab-btn" data-subtab="company">🏢 기업 지표</button>
      </nav>

      <div id="macro" class="subtab-panel active">
        <div id="macroList" class="indicator-list"></div>
        <p id="macroEmpty" class="empty-msg" hidden>등록된 거시 지표가 없어요.</p>
      </div>

      <div id="company" class="subtab-panel">
        <div id="companyList" class="indicator-list"></div>
        <p id="companyEmpty" class="empty-msg" hidden>등록된 기업 지표가 없어요.</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>정적으로 호스팅되는 블로그예요 · 모든 방문자에게 같은 내용이 보여요</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
